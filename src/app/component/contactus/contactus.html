<!-- Main Container -->
<div class="relative overflow-hidden py-16 lg:px-6" data-aos="fade-up" data-aos-duration="1000">
  <!-- Content Container -->
  <div class="relative z-10 max-w-7xl mx-auto px-6 lg:px-10 ">
    <!-- Overlay (optional for readability) -->

    <!-- Grid Layout: Left Content | Right Form -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-4 ">

      <!-- LEFT COLUMN: Hero with Full Height Background Image -->
      <div class="relative order-1 md:min-h-full">



        <!-- Content -->
        <div class="relative z-10 h-full flex flex-col lg:px-12 space-y-6 mb-6" >

          <!-- Headline -->
          <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-bold leading-tight mb-6" data-aos="fade-up" data-aos-duration="1000">
            Ready to Transform
            <span class="text-primary">Your HR?</span>
          </h1>

          <!-- Sub-headline -->
          <div>
            <p class="text-lg sm:text-xl font-light mb-3 text-gray-400" data-aos="fade-up" data-aos-duration="1000">
              See HR Connect in action. Schedule a personalized demo with our team.
            </p>
          </div>

         

        </div>

      </div>


      <!-- RIGHT COLUMN: Demo Request Form -->
      <div class="order-2 w-full ">
        <div class="bg-primary rounded-lg shadow-2xl p-6 sm:p-8 lg:p-10" data-aos="fade-up" data-aos-duration="1000">

          <!-- Form Title -->
          <h2 class="text-2xl sm:text-3xl font-bold text-white mb-4 lg:text-left border-b-2 border-primary pb-2">Contact Us Form</h2>

          <!-- Form -->
          <form (ngSubmit)="onSubmit()" class="space-y-3">
            <!-- Full Name -->
            <div class="space-y-1">
              <label for="fullName" class="block text-sm font-semibold text-white">Full Name</label>
              <input type="text" id="fullName" name="fullName" [(ngModel)]="formData.fullName"
                placeholder="Enter your full name"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 outline-none text-gray-800 placeholder-gray-400"
                required>
            </div>

            <!-- Company Name -->
            <div class="space-y-1">
              <label for="companyName" class="block text-sm font-semibold text-white">Company Name</label>
              <input type="text" id="companyName" name="companyName" [(ngModel)]="formData.companyName"
                placeholder="Enter your company name"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 outline-none text-gray-800 placeholder-gray-400"
                required>
            </div>

            <!-- Work Email -->
            <div class="space-y-1">
              <label for="workEmail" class="block text-sm font-semibold text-white">Work Email</label>
              <input type="email" id="workEmail" name="workEmail" [(ngModel)]="formData.workEmail"
                placeholder="Enter your work email"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 outline-none text-gray-800 placeholder-gray-400"
                required>
            </div>

            <!-- Phone Number -->
            <div class="space-y-1">
              <label for="phoneNumber" class="block text-sm font-semibold text-white">Phone Number</label>
              <input type="tel" id="phoneNumber" name="phoneNumber" [(ngModel)]="formData.phoneNumber"
                placeholder="Enter your phone number"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 outline-none text-gray-800 placeholder-gray-400"
                required>
            </div>

            <!-- Number of Employees -->
            <div class="space-y-1">
              <label for="employeeCount" class="block text-sm font-semibold text-white">Number of Employees:</label>
              <div class="relative">
                <select id="employeeCount" name="employeeCount" [(ngModel)]="formData.employeeCount"
                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 outline-none text-gray-700 appearance-none bg-white cursor-pointer">
                  <option *ngFor="let option of employeeOptions" [value]="option">{{ option }}</option>
                </select>
                <!-- Custom Arrow -->
                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none">
                  <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                  </svg>
                </div>
              </div>
            </div>

            <!-- Interests Checkboxes -->
            <div class="space-y-3">
              <label class="block text-sm font-semibold text-white">
                I'm interested in:
              </label>
              <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">

                <!-- Payroll -->
                <label class="flex items-center space-x-1 cursor-pointer group">
                  <input type="checkbox" [checked]="formData.interests.payroll" (change)="toggleInterest('payroll')"
                    class="w-5 h-5 border-2 border-gray-300 rounded text-blue-600 focus:ring-blue-500 cursor-pointer transition-all">
                  <span
                    class="text-xs md:text-sm text-white">Payroll</span>
                </label>

                <!-- Attendance -->
                <label class="flex items-center space-x-1 cursor-pointer group">
                  <input type="checkbox" [checked]="formData.interests.attendance"
                    (change)="toggleInterest('attendance')"
                    class="w-5 h-5 border-2 border-gray-300 rounded text-blue-600 focus:ring-blue-500 cursor-pointer transition-all">
                  <span
                    class="text-xs md:text-sm text-white">Attendance</span>
                </label>

                <!-- Recruitment -->
                <label class="flex items-center space-x-1 cursor-pointer group">
                  <input type="checkbox" [checked]="formData.interests.recruitment"
                    (change)="toggleInterest('recruitment')"
                    class="w-5 h-5 border-2 border-gray-300 rounded text-blue-600 focus:ring-blue-500 cursor-pointer transition-all">
                  <span
                    class="text-xs md:text-sm text-white">Recruitment</span>
                </label>

                <!-- PMS -->
                <label class="flex items-center space-x-1 cursor-pointer group">
                  <input type="checkbox" [checked]="formData.interests.pms" (change)="toggleInterest('pms')"
                    class="w-5 h-5 border-2 border-gray-300 rounded text-blue-600 focus:ring-blue-500 cursor-pointer transition-all">
                  <span class="text-xs md:text-sm text-white">PMS</span>
                </label>

                <!-- Other -->
                <label class="flex items-center space-x-1 cursor-pointer group">
                  <input type="checkbox" [checked]="formData.interests.other" (change)="toggleInterest('other')"
                    class="w-5 h-5 border-2 border-gray-300 rounded text-blue-600 focus:ring-blue-500 cursor-pointer transition-all">
                  <span
                    class="text-xs md:text-sm text-white">Other</span>
                </label>
              </div>
            </div>

            <!-- Submit Button -->
            <button type="submit"
              class="w-full bg-white hover:bg-blue-500 text-primary hover:text-white font-bold py-4 px-4 rounded-lg transition-all duration-200 transform hover:scale-[1.02] hover:shadow-lg focus:ring-4 mt-6">
              Schedule Demo
            </button>
          </form>

          <!-- Contact Info Section -->
          <div class="mt-4 pt-3 border-t border-gray-200">
            <h3 class="text-lg font-bold text-white mb-2">Contact Us Directly:</h3>

            <div class="space-y-1">
              <!-- Email -->
              <a href="https://{{contactInfo.email}}" class="flex items-center space-x-2 text-gray-600 hover:text-blue-600 transition-colors group">
                <div class="w-8 h-8 bg-blue-300 rounded-full flex items-center justify-center transition-colors">
                  <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                    </path>
                  </svg>
                </div>
                <span class="text-sm text-white">{{ contactInfo.email }}</span>
              </a>

              <!-- Phone -->
              <a href="tel:{{contactInfo.phone}}" class="flex items-center space-x-2 text-gray-600 hover:text-blue-600 transition-colors group">
                <div class="w-8 h-8 bg-blue-300 rounded-full flex items-center justify-center  transition-colors">
                  <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                    </path>
                  </svg>
                </div>
                <span class="text-sm text-white">{{ contactInfo.phone }}</span>
              </a>

              <!-- Address -->
              <div class="flex items-center space-x-2 ">
                <div class="w-8 h-8 bg-blue-300 rounded-full flex items-center justify-center">
                  <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  </svg>
                </div>
                <span class="text-sm text-white">{{ contactInfo.address }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

     <!-- Social Media Footer -->
          <div class="mt-8 lg:mt-12 pt-8 border-t border-gray-200">
            <div class="flex flex-col sm:flex-row justify-center items-center space-y-4 sm:space-y-0 sm:space-x-8">

              <!-- Social Icons -->
              <div class="flex space-x-4" data-aos="fade-up" data-aos-duration="1000">
                <a *ngFor="let social of socialLinks" [href]="social.url"
                  class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-primary hover:bg-blue-100/95 hover:scale-110 transition-all duration-200 shadow-lg"
                  [attr.aria-label]="social.name">
                  <!-- Facebook -->
                  <svg *ngIf="social.name === 'Facebook'" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path
                      d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
                  </svg>

                  <!-- Twitter -->
                  <svg *ngIf="social.name === 'Twitter'" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path
                      d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z" />
                  </svg>

                  <!-- LinkedIn -->
                  <svg *ngIf="social.name === 'LinkedIn'" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path
                      d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
                  </svg>

                  <!-- Instagram -->
                  <svg *ngIf="social.name === 'Instagram'" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path
                      d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
                  </svg>
                </a>
              </div>
            </div>

          </div>


  </div>
</div>
