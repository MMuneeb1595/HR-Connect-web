<section class="bg-primary relative overflow-hidden py-16 lg:px-6">
  <div class="max-w-7xl mx-auto px-6 lg:px-10 ">

    <!-- Glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 
        w-[300px] sm:w-[400px] lg:w-[500px] h-[300px] sm:h-[400px] lg:h-[500px]
        bg-white opacity-40 blur-[120px] rounded-full">
    </div>

    <!-- Heading -->
    <h1 class="font-alexandria text-2xl sm:text-3xl md:text-4xl lg:text-5xl xl:text-6xl font-bold text-white text-center mb-10 sm:mb-12 lg:mb-16 leading-tight" data-aos="fade-up" data-aos-duration="1000">
      Why Modern Businesses Choose HR Connect
    </h1>

    <!-- Layout -->
    <div class="flex flex-col lg:flex-row gap-4">

      <!-- LEFT: Cards -->
      <div class="w-full ">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4 sm:gap-6">

          @for (feature of features; track $index; let i = $index) {
          <div (click)="setActive(i)" class="rounded-2xl p-4 sm:p-5 lg:p-6 flex gap-4 items-start sm:items-center transition-all duration-500 cursor-pointer" [ngClass]="activeIndex() === i ? 'bg-white shadow-xl text-primary' : 'bg-transparent border border-white text-white hover:bg-white hover:text-primary'" data-aos="fade-up" data-aos-duration="1000">

            <!-- ICON -->
            <div class="shrink-0">
              <svg class="w-10 h-10 sm:w-12 sm:h-12 lg:w-14 lg:h-14"
                   fill="none" stroke="currentColor" stroke-width="1.5"
                   viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 6v6h4m6-2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>

            <!-- TEXT -->
            <div>
              <h6 class="font-semibold text-base sm:text-lg lg:text-xl mb-1">
                {{ feature.title }}
              </h6>
              <p class="text-sm sm:text-base line-clamp-2"
                 [class.text-gray-600]="activeIndex() === i">
                {{ feature.desc }}
              </p>
            </div>

          </div>
          }

        </div>
      </div>

      <!-- RIGHT: Image -->
      <div class="w-full h-full" data-aos="fade-up" data-aos-duration="1000">
        <img src="assets/images/hrms.png" alt="HRMS" class="w-full h-full rounded-2xl shadow-xl object-cover">
      </div>

    </div>
  </div>
</section>
