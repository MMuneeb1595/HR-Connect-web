<section class="bg-primary py-16 lg:px-6" id="resources">
  <div class="max-w-7xl mx-auto px-6 lg:px-10">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row" data-aos="fade-up" data-aos-duration="1000">
      
      <!-- Left Content -->
      <div class="w-full md:w-[calc(100%-250px)] p-5 sm:p-10 md:p-16">
        <h2 class="text-4xl font-bold text-primary mb-10" data-aos="fade-up" data-aos-duration="1000">Resources</h2>
        
        <div class="space-y-8">
          <div *ngFor="let resource of resources" class="group" data-aos="fade-up" data-aos-duration="1000">
            <div class="flex items-start space-x-4">
              <!-- Icon -->
              <div class="flex-shrink-0 w-8 h-8 md:w-12 md:h-12 bg-primary rounded-lg flex items-center justify-center shadow-md group-hover:bg-pritext-primary transition-colors duration-300">
                <svg class="w-4 h-4 md:w-6 md:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getIcon(resource.title)"></path>
                </svg>
              </div>
              
              <!-- Content -->
              <div class="flex-1">
                <h3 class="text-lg md:text-xl font-semibold text-gray-800 mt-1 md:mt-3 mb-3">{{ resource.title }}</h3>
                <ul class="space-y-2">
                  <li *ngFor="let item of resource.items" class="flex items-center">
                    <span class="text-primary mr-2 font-extrabold">•</span>
                    <span class="text-gray-600 cursor-pointer text-sm md:text-sm transition-colors duration-200">{{ item }}</span>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Right Image -->
      <div class="w-full md:w-[50%] relative" >
        <div class="h-72 md:h-full w-full overflow-hidden" data-aos="fade-up" data-aos-duration="1000">
          <img 
            src="assets/images/girl.png" 
            alt="Professional woman working" 
            class="min-w-full h-full object-cover object-center"
          />
        </div>
      </div>
      
    </div>
  </div>
</section>
